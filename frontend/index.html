<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DevOps Copilot</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --green: #3fb950;
      --red: #f85149;
      --amber: #d29922;
      --purple: #a371f7;
      --blue: #58a6ff;
      --text: #e6edf3;
      --text2: #8b949e;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      width: 36px; height: 36px;
      background: #1a3a21;
      border: 1px solid var(--green);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      color: var(--green);
      font-size: 14px;
    }
    .header-title { font-family: var(--mono); font-size: 15px; font-weight: 500; }
    .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--green); }
    textarea::placeholder { color: var(--text2); }

    .btn {
      margin-top: 12px;
      background: var(--green);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .result-card {
      margin-top: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: none;
    }
    .result-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-title { font-family: var(--mono); font-size: 13px; font-weight: 500; }
    .severity-badge {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .result-body { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .result-field label {
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-family: var(--mono);
      display: block;
      margin-bottom: 6px;
    }
    .result-field p {
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
    }

    .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    .incidents-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .incidents-table th {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .incidents-table td {
      padding: 12px 14px;
      border-bottom: 1px solid #21262d;
      color: var(--text2);
      vertical-align: top;
    }
    .incidents-table tr:hover td { background: var(--surface2); color: var(--text); }
    .incidents-table .log-cell {
      font-family: var(--mono);
      font-size: 11px;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #0d1117;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text2);
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">AI</div>
  <div>
    <div class="header-title">AI DevOps Copilot</div>
    <div class="header-sub">Incident analysis powered by OpenAI</div>
  </div>
</div>

<div class="container">

  <!-- Analyze section -->
  <div class="section-title">// paste log for analysis</div>
  <textarea id="log-input" placeholder="Paste your log here...
Example: CrashLoopBackOff: pod payment-service restarting, exit code 137"></textarea>
  <button class="btn" id="analyze-btn" onclick="analyzeLog()">
    <span id="btn-text">Analyze Log</span>
    <div class="spinner" id="spinner" style="display:none"></div>
  </button>

  <!-- Result card -->
  <div class="result-card" id="result-card">
    <div class="result-header">
      <span class="result-title">Analysis Result</span>
      <span class="severity-badge" id="severity-badge"></span>
    </div>
    <div class="result-body">
      <div class="result-field">
        <label>Root Cause</label>
        <p id="result-cause"></p>
      </div>
      <div class="result-field">
        <label>Recommended Fix</label>
        <p id="result-fix"></p>
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- Incidents history -->
  <div class="section-title">// recent incidents</div>
  <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;">
    <table class="incidents-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Log</th>
          <th>Cause</th>
          <th>Severity</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="incidents-body">
        <tr><td colspan="5"><div class="empty-state">Loading incidents...</div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  const API = 'http://localhost:8000/api';

  const severityColors = {
    low:      { bg: '#2d2208', color: '#d29922', border: '#d2992244' },
    medium:   { bg: '#2d1a08', color: '#f0883e', border: '#f0883e44' },
    high:     { bg: '#2d1010', color: '#f85149', border: '#f8514944' },
    critical: { bg: '#1e1040', color: '#a371f7', border: '#a371f744' },
  };

  async function analyzeLog() {
    const logText = document.getElementById('log-input').value.trim();
    if (!logText) return;

    const btn = document.getElementById('analyze-btn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Analyzing...';

    try {
      const res = await fetch(`${API}/analyze-log`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ log_text: logText })
      });
      const data = await res.json();

      const card = document.getElementById('result-card');
      const badge = document.getElementById('severity-badge');
      const colors = severityColors[data.severity] || severityColors.medium;

      document.getElementById('result-cause').textContent = data.cause;
      document.getElementById('result-fix').textContent = data.fix;

      badge.textContent = data.severity;
      badge.style.background = colors.bg;
      badge.style.color = colors.color;
      badge.style.border = `1px solid ${colors.border}`;

      card.style.display = 'block';

      loadIncidents();
    } catch (err) {
      alert('Error connecting to API. Is uvicorn running?');
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Analyze Log';
    }
  }

  async function loadIncidents() {
    try {
      const res = await fetch(`${API}/incidents`);
      const incidents = await res.json();
      const tbody = document.getElementById('incidents-body');

      if (!incidents.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">No incidents yet</div></td></tr>';
        return;
      }

      tbody.innerHTML = incidents.map(i => {
        const colors = severityColors[i.severity] || severityColors.medium;
        const time = new Date(i.created_at).toLocaleString();
        return `<tr>
          <td style="font-family:var(--mono);color:var(--text2)">${i.id}</td>
          <td class="log-cell">${i.log_text}</td>
          <td style="max-width:240px">${i.cause}</td>
          <td>
            <span style="font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:4px;background:${colors.bg};color:${colors.color};border:1px solid ${colors.border}">
              ${i.severity}
            </span>
          </td>
          <td style="font-family:var(--mono);font-size:11px;white-space:nowrap">${time}</td>
        </tr>`;
      }).join('');
    } catch (err) {
      console.error('Failed to load incidents', err);
    }
  }

  // Load on enter key
  document.getElementById('log-input').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') analyzeLog();
  });

  loadIncidents();
</script>
</body>
</html>
