version: '3.8'

services:
  db:
    image: postgres:15
    container_name: copilot-db
    environment:
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: copilot-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://postgres:devpass@db:5432/copilot
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../data:/app/data
      - ../frontend:/app/frontend

volumes:
  postgres_data: